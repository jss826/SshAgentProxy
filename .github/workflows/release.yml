name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Test
        run: dotnet test Tests/SshAgentProxy.Tests.csproj --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish SshAgentProxy.csproj -c Release -r win-x64 -o ./publish-output

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path ./publish-output/SshAgentProxy.exe -DestinationPath SshAgentProxy-win-x64.zip

      - name: Upload to release
        run: gh release upload ${{ github.ref_name }} SshAgentProxy-win-x64.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
